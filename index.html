<!DOCTYPE html>
<html>
<head>
  <title>Invitación especial 👀</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      margin-top: 100px;
      background-color: #ffe6f0;
    }
    button {
      padding: 12px 25px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
    }
    #si {
      background-color: #ff4d6d;
      color: white;
    }
    #no {
      background-color: gray;
      color: white;
      position: absolute;
    }
  </style>
</head>
<body>

<h1>Se busca catadora profesional 👩‍🍳</h1>
<p>Requisito: sobrevivir a mi cocina 🧪</p>
<p>Oferta: almuerzo este sábado preparado por mí</p>

<h2>¿Aceptas el reto? 😏</h2>

<button id="si" onclick="aceptar()">Sí 😍</button>
<button id="no" onmouseover="mover()">No 😢</button>

<script>
function aceptar() {
  document.body.innerHTML = "<h1>Sabía que aceptarías 😏💖<br>Te escribo para coordinar 👀</h1>";
}

function mover() {
  let x = Math.random() * window.innerWidth;
  let y = Math.random() * window.innerHeight;
  let btn = document.getElementById("no");
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}
</script>

</body>
</html>
