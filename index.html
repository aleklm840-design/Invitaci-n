<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pregunta importante</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 100px;
    overflow: hidden;
  }

  h2 {
    font-size: 28px;
  }

  button {
    padding: 10px 20px;
    font-size: 16px;
    margin: 10px;
    cursor: pointer;
    position: absolute;
    transition: all 0.2s ease;
  }

  #si {
    position: static;
    font-size: 18px;
  }
</style>
</head>
<body>

<h2>¿Quieres salir conmigo? 😳</h2>

<button id="si">Sí 💖</button>
<button id="no">No 😅</button>

<script>
const noBtn = document.getElementById("no");
const siBtn = document.getElementById("si");

let size = 18;

noBtn.addEventListener("mouseover", () => {
  // mover el botón NO
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  // hacer crecer el botón SI
  size += 5;
  siBtn.style.fontSize = size + "px";
  siBtn.style.padding = (size / 2) + "px " + size + "px";
});
</script>

</body>
</html>
