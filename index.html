<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Plan importante</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
    background: linear-gradient(135deg, #e0eafc, #cfdef3);
  }

  .pantalla {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 2;
    text-align: center;
  }

  h2 {
    font-size: 26px;
    color: #333;
    white-space: pre-line;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 12px;
    transition: all 0.2s ease;
  }

  #si {
    background-color: #4CAF50;
    color: white;
  }

  #no {
    background-color: #f44336;
    color: white;
    position: absolute;
  }

  #pantalla2 {
    display: none;
  }

  #mensajeFinal {
    font-size: 26px;
    color: #333;
    white-space: pre-line;
    animation: aparecer 0.6s ease;
  }

  @keyframes aparecer {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  /* BURBUJAS FONDO */
  .burbujas {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 1;
    overflow: hidden;
  }

  .burbujas span {
    position: absolute;
    bottom: -50px;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    animation: subir 10s linear infinite;
  }

  @keyframes subir {
    to {
      transform: translateY(-110vh);
    }
  }

  /* EMOJIS */
  .emoji {
    position: absolute;
    top: -50px;
    font-size: 24px;
    animation: caer linear infinite;
  }

  @keyframes caer {
    to {
      transform: translateY(110vh);
    }
  }
</style>

</head>
<body>

<div class="burbujas"></div>

<!-- PANTALLA 1 -->
<div id="pantalla1" class="pantalla">
  <h2>👨‍🍳 Se mi catadora 
Requisito: sobrevivir a mi cocina 🧪

Oferta: almuerzo este sábado preparado por mí

¿Aceptas? 🙄</h2>

  <button id="si">Sí 😇</button>
  <button id="no">No 🥹</button>
</div>

<!-- PANTALLA 2 -->
<div id="pantalla2" class="pantalla">
  <div id="mensajeFinal">
    Sabía que aceptarías 😏
    Te escribo para coordinar 👀
  </div>
</div>

<script>
const noBtn = document.getElementById("no");
const siBtn = document.getElementById("si");

let size = 18;

// NO escapa
noBtn.addEventListener("mouseover", escapar);
noBtn.addEventListener("touchstart", escapar);

function escapar() {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  size += 5;
  siBtn.style.fontSize = size + "px";
  siBtn.style.padding = (size/2) + "px " + size + "px";
}

// cambio de pantalla
siBtn.addEventListener("click", () => {
  document.getElementById("pantalla1").style.display = "none";
  document.getElementById("pantalla2").style.display = "flex";

  lluviaEmojis();
});

// lluvia emojis
function lluviaEmojis() {
  const emojis = ["🐱","🍜"];

  setInterval(() => {
    const emoji = document.createElement("div");
    emoji.classList.add("emoji");
    emoji.innerText = emojis[Math.floor(Math.random()*emojis.length)];

    emoji.style.left = Math.random() * 100 + "vw";
    emoji.style.animationDuration = (Math.random()*3+2) + "s";

    document.body.appendChild(emoji);

    setTimeout(() => emoji.remove(), 5000);
  }, 200);
}

// burbujas fondo
const contenedor = document.querySelector(".burbujas");

for (let i = 0; i < 20; i++) {
  const burbuja = document.createElement("span");

  const size = Math.random() * 40 + 10;

  burbuja.style.width = size + "px";
  burbuja.style.height = size + "px";
  burbuja.style.left = Math.random() * 100 + "%";
  burbuja.style.animationDuration = (Math.random()*10 + 5) + "s";

  contenedor.appendChild(burbuja);
}
</script>

</body>
</html>
