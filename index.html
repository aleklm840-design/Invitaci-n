<!DOCTYPE html>
<html>
<head>
  <title>Invitación 👀</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      margin-top: 100px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    button {
      padding: 12px 25px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
    }
    #si {
      background-color: #2ecc71;
      color: white;
    }
    #no {
      background-color: #555;
      color: white;
      position: absolute;
    }
  </style>
</head>
<body>

<h1>Se busca catadora profesional 👨‍🍳😏</h1>
<p>Requisito: sobrevivir a mi cocina 🧪</p>
<p>Oferta: almuerzo este sábado preparado por mí</p>

<h2>¿Aceptas el reto? 😏</h2>

<button id="si" onclick="aceptar()">Sí 😇</button>
<button id="no" onmouseover="mover()" ontouchstart="mover()" onclick="mover()">No 😢</button>

<script>
function aceptar() {
  document.body.innerHTML = `
    <h1>Sabía que aceptarías 😏<br>Te escribo para coordinar 👀</h1>
    <img src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif" width="200">
  `;
}

function mover() {
  let x = Math.random() * (window.innerWidth - 120);
  let y = Math.random() * (window.innerHeight - 60);
  let btn = document.getElementById("no");
  btn.style.position = "absolute";
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}
</script>

</body>
</html>
