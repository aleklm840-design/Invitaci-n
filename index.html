<!DOCTYPE html>
<html>
<head>
  <title>Invitación 👀</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      margin-top: 100px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      overflow: hidden;
    }
    button {
      padding: 12px 25px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
    }
    #si {
      background-color: #2ecc71;
      color: white;
    }
    #no {
      background-color: #555;
      color: white;
      position: absolute;
    }
    .emoji {
      position: absolute;
      font-size: 30px;
      animation: caer 2s linear infinite;
    }
    @keyframes caer {
      0% {transform: translateY(-100px);}
      100% {transform: translateY(100vh);}
    }
  </style>
</head>
<body>

<h1>Se busca catadora profesional 👨‍🍳😏</h1>
<p>Requisito: sobrevivir a mi cocina 🧪</p>
<p>Oferta: almuerzo este sábado preparado por mí</p>

<h2>¿Aceptas el reto? 😏</h2>

<button id="si" onclick="aceptar()">Sí 😇</button>
<button id="no" onmouseover="mover()" ontouchstart="mover()" onclick="mover()">No 😢</button>

<script>
function aceptar() {
  document.body.innerHTML = "<h1>Sabía que aceptarías 😏<br>Te escribo para coordinar 👀</h1>";
  
  for (let i = 0; i < 20; i++) {
    let emoji = document.createElement("div");
    emoji.className = "emoji";
    emoji.innerHTML = "🐱";
    emoji.style.left = Math.random() * window.innerWidth + "px";
    emoji.style.animationDuration = (Math.random() * 2 + 1) + "s";
    document.body.appendChild(emoji);
  }
}

function mover() {
  let x = Math.random() * (window.innerWidth - 120);
  let y = Math.random() * (window.innerHeight - 60);
  let btn = document.getElementById("no");
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}
</script>

</body>
</html>
