<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Plan importante</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 100px;
    overflow: hidden;
    background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
  }

  h2 {
    font-size: 26px;
    color: #333;
    white-space: pre-line;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 12px;
    transition: all 0.2s ease;
  }

  #si {
    background-color: #4CAF50;
    color: white;
  }

  #no {
    background-color: #f44336;
    color: white;
    position: absolute;
  }

  #mensaje {
    display: none;
    font-size: 22px;
    margin-top: 30px;
    color: #333;
    animation: aparecer 0.5s ease;
  }

  @keyframes aparecer {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }
</style>

</head>
<body>

<h2>👨‍🍳 Se mi catadora 
Requisito: sobrevivir a mi cocina 🧪

Oferta: almuerzo este sábado preparado por mí

¿Aceptas? 🙄</h2>

<button id="si">Sí 😇</button>
<button id="no">No 😅</button>

<div id="mensaje">
  Sabía que aceptarías 😏<br>
  Te escribo para coordinar 👀
</div>

<script>
const noBtn = document.getElementById("no");
const siBtn = document.getElementById("si");
const mensaje = document.getElementById("mensaje");

let size = 18;

// mover el NO (PC + celular)
noBtn.addEventListener("mouseover", escapar);
noBtn.addEventListener("touchstart", escapar);

function escapar() {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  // hacer crecer el botón SI
  size += 5;
  siBtn.style.fontSize = size + "px";
  siBtn.style.padding = (size/2) + "px " + size + "px";
}

// cuando presiona SI
siBtn.addEventListener("click", () => {
  mensaje.style.display = "block";
});
</script>

</body>
</html>
